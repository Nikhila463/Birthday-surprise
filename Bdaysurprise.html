<!DOCTYPE html>
<html>
<head>
<title>Birthday Fireworks Surprise 🎆</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    height:100vh;
}

/* Slides Base */
.slide{
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:opacity 1s ease;
}

/* Slide 1 */
#slide1{
    background:linear-gradient(to right,#ff9a9e,#fad0c4);
}

/* Slide 2 */
#slide2{
    background:linear-gradient(135deg,#ff9ccf,#ff4da6,#ff85c1);
    opacity:0;
    pointer-events:none;
    font-family:'Courier New', monospace;
}

/* Slide 3 */
#slide3{
    background:linear-gradient(135deg,#ffe29f,#ffa99f);
    opacity:0;
    pointer-events:none;
}

/* Buttons */
button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}

button:hover{
    background:#ff1e4d;
    transform:scale(1.1);
}

/* Image */
#photo{
    width:350px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,255,255,0.8);
    opacity:0;
    transform:scale(0.5);
    transition:1.5s ease;
}

.showImage{
    opacity:1 !important;
    transform:scale(1) !important;
}

/* Typing */
#text{
    width:80%;
    max-width:800px;
    font-size:22px;
    line-height:1.7;
    white-space:pre-line;
    color:white;
}

.cursor{
    display:inline-block;
    width:3px;
    background:white;
    animation:blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* Slap */
#girl{
    font-size:120px;
    margin-bottom:30px;
}

#hand{
    font-size:80px;
    position:absolute;
    left:-150px;
    transition:0.2s;
}

.slapMove{
    transform:translateX(250px) rotate(-25deg);
}

#slapCounter{
    font-size:28px;
    margin-top:120px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div id="slide1" class="slide">
    <h2>🎁 Something special for you 💕</h2>
    <button id="startBtn">Are You Ready? 💖</button>
    <img id="photo" src="tulasi.jpg">
    <button id="toLetter" style="display:none;">Next 💌</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">
    <div id="text"></div><span class="cursor"></span>
    <button id="toSlap" style="display:none;">One More Surprise 😈</button>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
    <div id="girl">👧</div>
    <div id="hand">🖐</div>
    <div id="slapCounter"></div>
</div>

<script>

/* START BUTTON */
document.getElementById("startBtn").onclick=function(){
    this.style.display="none";
    document.getElementById("photo").classList.add("showImage");

    setTimeout(()=>{
        document.getElementById("toLetter").style.display="inline-block";
    },1500);
};

/* GO TO LETTER */
document.getElementById("toLetter").onclick=function(){
    document.getElementById("slide1").style.opacity="0";
    document.getElementById("slide1").style.pointerEvents="none";

    document.getElementById("slide2").style.opacity="1";
    document.getElementById("slide2").style.pointerEvents="auto";

    typeWriter();
};

/* Typing Message */
const message = `Happiest birthday babe. 💖
The moment we came into your life, your life became brighter… and you are blessed to have us. 😌
I hope our friendship lasts like this forever.
But no matter where we are, our friendship stays same.
I love youuu.
— From your roomies 💕`;

let index=0;

function typeWriter(){
    if(index < message.length){
        document.getElementById("text").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeWriter,35);
    } else {
        document.getElementById("toSlap").style.display="inline-block";
    }
}

/* GO TO SLAP SLIDE */
document.getElementById("toSlap").onclick=function(){
    document.getElementById("slide2").style.opacity="0";
    document.getElementById("slide2").style.pointerEvents="none";

    document.getElementById("slide3").style.opacity="1";
    document.getElementById("slide3").style.pointerEvents="auto";

    startSlaps();
};

/* 21 SLAPS */
function startSlaps(){
    let count=0;
    const hand=document.getElementById("hand");
    const counter=document.getElementById("slapCounter");

    let slapInterval=setInterval(()=>{
        if(count<21){
            count++;
            hand.classList.add("slapMove");
            setTimeout(()=>hand.classList.remove("slapMove"),200);
            counter.innerHTML="Birthday Slap "+count+" 🎂";
        }else{
            clearInterval(slapInterval);
            counter.innerHTML="🎉 21 YEARS OLD BABYYYY 🎉";
        }
    },400);
}

</script>
</body>
</html>
