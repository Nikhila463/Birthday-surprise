<!DOCTYPE html>
<html>
<head>
<title>Birthday Fireworks Surprise 🎆</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(to right, #ff9a9e, #fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial, sans-serif;
    transition:background 2s ease;
    text-align:center;
    color:white;
}

/* Intro Text */
#introText{
    font-size:28px;
    margin-bottom:30px;
    animation:fadeIn 2s ease forwards;
}

/* Buttons */
#startBtn, #nextBtn{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    transition:0.3s;
    display:none;
    margin-top:20px;
}

#startBtn:hover, #nextBtn:hover{
    background:#ff1e4d;
    transform:scale(1.1);
}

/* Image Section */
#imageSection{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin-top:20px;
}

/* Image */
#photo{
    width:380px;
    border-radius:20px;
    box-shadow:0 0 50px rgba(255,255,255,0.8);
    opacity:0;
    transform:scale(0.5);
    transition:all 1.5s ease;
}

.showImage{
    opacity:1 !important;
    transform:scale(1) !important;
}

/* Balloon */
.balloon{
    position:absolute;
    bottom:-200px;
    width:90px;
    height:110px;
    border-radius:50%;
    animation:floatUp 6s linear forwards;
    box-shadow:0 0 20px rgba(255,255,255,0.6);
}

.string{
    position:absolute;
    width:2px;
    height:80px;
    background:#555;
    bottom:-80px;
    left:50%;
    transform:translateX(-50%);
}

.letter{
    position:absolute;
    bottom:-120px;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    font-weight:bold;
    color:white;
}

@keyframes floatUp{
    0%{transform:translateY(0);}
    100%{transform:translateY(-130vh);}
}

/* Fade */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* Fireworks Canvas */
canvas{
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
}

/* -------- SLIDE 2 -------- */

#slide2{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ff9ccf,#ff4da6,#ff85c1);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:opacity 1.5s ease;
    font-family:'Courier New', monospace;
}

.container{
    text-align:center;
    width:85%;
    max-width:800px;
    color:white;
}

#text{
    font-size:24px;
    line-height:1.7;
    white-space:pre-line;
    text-shadow:0 0 5px #ffb6d9;
}

.cursor{
    display:inline-block;
    width:3px;
    background:white;
    margin-left:5px;
    animation:blink 0.8s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

/* Floating hearts */
.heart{
    position:absolute;
    bottom:-20px;
    font-size:20px;
    animation:float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{transform:translateY(0) scale(1);}
    100%{transform:translateY(-110vh) scale(1.5);}
}
</style>
</head>

<body>

<div id="introText">🎁 Something special for you from your friends 💕</div>

<button id="startBtn">Are You Ready? 💖</button>

<div id="imageSection">
    <img id="photo" src="tulasi.jpg">
    <button id="nextBtn">Next 💌</button>
</div>

<canvas id="fireworks"></canvas>

<!-- Slide 2 -->
<div id="slide2">
    <div class="container">
        <div id="text"></div><span class="cursor"></span>
    </div>
</div>

<script>

let text = "HAPPY BIRTHDAY";
let colors = ["#ff4d6d","#ff85a2","#ff99c8","#ff5d8f","#ff7096"];

setTimeout(()=>{
    document.getElementById("startBtn").style.display="inline-block";
},2000);

document.getElementById("startBtn").onclick = function(){
    document.getElementById("introText").style.display="none";
    this.style.display="none";

    for(let i=0;i<text.length;i++){
        setTimeout(()=>{
            createBalloon(text[i], 5 + i*6);
        }, i*300);
    }

    setTimeout(()=>{
        document.body.style.background =
        "linear-gradient(to right, #667eea, #764ba2)";
        showImage();
        startFireworks();
        document.getElementById("nextBtn").style.display="inline-block";
    }, 5000);
};

document.getElementById("nextBtn").onclick = function(){
    document.getElementById("slide2").style.opacity="1";
    document.getElementById("slide2").style.pointerEvents="auto";
    typeWriter();
};

function createBalloon(letter, position){
    let balloon = document.createElement("div");
    balloon.className="balloon";
    balloon.style.left=position+"vw";
    balloon.style.background=colors[Math.floor(Math.random()*colors.length)];

    let string = document.createElement("div");
    string.className="string";

    let letterDiv = document.createElement("div");
    letterDiv.className="letter";
    letterDiv.innerHTML=letter;

    balloon.appendChild(string);
    balloon.appendChild(letterDiv);
    document.body.appendChild(balloon);
}

function showImage(){
    document.getElementById("photo").classList.add("showImage");
}

/* Fireworks */
function startFireworks(){
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    function createFirework(){
        let x = Math.random()*canvas.width;
        let y = Math.random()*canvas.height/2;
        for(let i=0;i<80;i++){
            particles.push({
                x:x,
                y:y,
                radius:2,
                color:"hsl("+Math.random()*360+",100%,60%)",
                speedX:(Math.random()-0.5)*6,
                speedY:(Math.random()-0.5)*6,
                life:100
            });
        }
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach((p,index)=>{
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle=p.color;
            ctx.fill();
            p.x+=p.speedX;
            p.y+=p.speedY;
            p.life--;
            if(p.life<=0) particles.splice(index,1);
        });
        requestAnimationFrame(animate);
    }

    setInterval(createFirework,800);
    animate();
}

/* Typing Message */
const message = `Happiest birthday babe. 💖
The moment we came into your life, your life became brighter… and you are blessed to have us. 😌
I hope our friendship lasts like this forever. Maybe next year we won’t be there to celebrate your birthday because we might move to different places for our future.
But no matter where we are, I hope our friendship always remains the same.
And don’t you dare forget us!
No matter where life takes us, we will always support you.

I love youuu.
— From your roomies, no homies 💕`;

let index = 0;
let speed = 35;

function typeWriter(){
    if(index < message.length){
        document.getElementById("text").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeWriter, speed);
    }
}

/* Floating hearts */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 7000);
}
setInterval(createHeart, 500);

</script>

</body>
</html>
